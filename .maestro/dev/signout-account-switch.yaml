appId: com.daanvos.namenest
---
# Starting state (required): Signed-in; MainTabs registered on stack (completed onboarding + typically room joined).
# Dev automation: `openLink` opens Settings tab (__DEV__ only). Alternative: `namematch://maestro/settings`
- openLink: com.daanvos.namenest://maestro/settings
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: settings-sign-out-button
    timeout: 15000
- tapOn:
    id: settings-sign-out-button
- tapOn: Sign out
- assertVisible:
    id: welcome-login-button
- tapOn:
    id: welcome-login-button
- assertVisible:
    id: auth-email-input
- tapOn:
    id: auth-email-input
- eraseText
- inputText: ${MAESTRO_SWITCH_EMAIL}
- tapOn:
    id: auth-password-input
- eraseText
- inputText: ${MAESTRO_SWITCH_PASSWORD}
- tapOn:
    id: auth-submit-button
