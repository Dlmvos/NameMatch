appId: com.daanvos.namenest
---
# Starting state (required): Signed-in with MainTabs on stack (premium flow touches Shop).
# Dev automation: `openLink` opens Shop tab (__DEV__ only). Alternative: `namematch://maestro/shop`
- openLink: com.daanvos.namenest://maestro/shop
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: shop-premium-cta-button
    timeout: 15000
- tapOn:
    id: shop-premium-cta-button
- tapOn: OK
- assertVisible:
    id: shop-premium-active-state
