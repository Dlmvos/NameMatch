appId: com.daanvos.namenest
---
# Starting state (required): Authenticated user; stack includes Paywall (normal free-tier partner/main stacks).
# Dev automation: `openLink` jumps to Paywall via __DEV__ handler only (see `src/navigation/maestroDevDeepLink.ts`).
# Equivalent manual URLs: `namematch://maestro/paywall` or `com.daanvos.namenest://maestro/paywall`
# Dev-client: Metro already running — do NOT launchApp here.
- openLink: com.daanvos.namenest://maestro/paywall
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: paywall-continue-free-button
    timeout: 15000
- tapOn:
    id: paywall-continue-free-button
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: swipe-screen-root
    timeout: 25000
