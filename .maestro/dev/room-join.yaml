appId: com.daanvos.namenest
---
# Starting state (required): Partner stack registered (onboarding done; often no room yet).
# Dev automation: `openLink` navigates to PartnerConnect (__DEV__ only). Alternative: `namematch://maestro/partner`
- openLink: com.daanvos.namenest://maestro/partner
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: partner-tab-join
    timeout: 15000
- tapOn:
    id: partner-tab-join
- assertVisible:
    id: partner-join-code-input
- tapOn:
    id: partner-join-code-input
- inputText: ${MAESTRO_ROOM_CODE}
- tapOn:
    id: partner-join-room-button
