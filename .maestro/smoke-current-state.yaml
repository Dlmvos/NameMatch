appId: com.daanvos.namenest
---
# Starting state (required): Authenticated; onboarding complete; stack includes MainTabs (usually room joined).
# Dev automation: `openLink` navigates to Swipe tab (__DEV__ only). Same scheme works as `namematch://maestro/main`.
# Dev-client: JS already loaded — no launchApp.
- openLink: com.daanvos.namenest://maestro/main
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: swipe-screen-root
    timeout: 25000
